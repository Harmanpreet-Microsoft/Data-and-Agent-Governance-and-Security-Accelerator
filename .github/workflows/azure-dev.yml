name: Template Validation

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  template_validation_job:
    runs-on: ubuntu-latest
    name: Validate Template Standards
    environment: azd-template-gallery
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          $modules = @('Az.Purview','Az.Security','Az.Storage','Az.KeyVault')
          foreach ($m in $modules) {
            if (-not (Get-Module -ListAvailable -Name $m -ErrorAction SilentlyContinue)) {
              Install-Module -Name $m -Scope CurrentUser -Force -AllowClobber -AcceptLicense -Confirm:$false
            }
          }
      - uses: microsoft/template-validation-action@Latest
        id: validation
        with:
          validateAzd: ${{ vars.AZD_VALIDATE || 'false' }}
          useDevContainer: ${{ vars.AZD_USE_DEV_CONTAINER || 'false' }}
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: print result
        if: always()
        run: cat ${{ steps.validation.outputs.resultFile }}
